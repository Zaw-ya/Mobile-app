name: app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.3+7 # for android only
#version: 2.0.3+70  # for android only

environment:
  sdk: ^3.6.0


dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  json_serializable: ^6.0.0
  freezed: ^2.5.7
  build_runner: ^2.4.14
  pretty_dio_logger: ^1.4.0
  retrofit_generator: ^9.1.7
  flutter_gen: ^5.14.1
  retrofit: ^4.4.2
  another_flushbar: ^1.12.30
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  dio: ^5.7.0
  easy_localization: ^3.0.7
  flutter_screenutil: ^5.9.3
  get_it: ^8.0.3
  device_info_plus: ^11.2.0
  flutter_bloc: ^8.1.6
  audioplayers: ^6.1.0
  mobile_scanner: ^7.0.1
  url_launcher: ^6.3.2
  geolocator: ^13.0.2
  location: ^6.0.2
  image_picker: ^1.1.2
  path: ^1.9.0
  http_parser: ^4.1.2
  flutter_spinkit: ^5.2.1
  camera: ^0.11.0+2
  table_calendar: ^3.1.3
  fl_chart: ^0.70.2
  timezone: ^0.9.2
  permission_handler: ^11.3.1
  firebase_core: ^3.14.0
  image: ^4.5.2
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^18.0.1
  package_info_plus: ^8.3.0
  firebase_messaging: ^15.2.7
  firebase_crashlytics: ^4.3.5
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  flutter_image_compress: ^2.4.0
  flutter_offline: ^5.0.0
  lottie: ^3.3.2
  flutter_svg: ^2.2.4
  local_auth: ^3.0.1
  dartz: ^0.10.1
  modal_progress_hud_nsn: ^0.5.1
  in_app_review: ^2.0.11


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  min_sdk_android: 21
  remove_alpha_ios: true
  image_path: "assets/images/icon_logo_symbol_light.png"
  background_color: "#262938"
  adaptive_icon_background: "#262938"
  adaptive_icon_foreground: "assets/images/icon_logo_symbol_light.png"

flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/sounds/
    - assets/translations/
    - assets/lottie/


  fonts:
    # ── Legacy (kept during transition — do not remove until all screens updated) ──
    - family: SFPro
      fonts:
        - asset: assets/fonts/sfprodisplaybold.otf
          weight: 700
        - asset: assets/fonts/sfprodisplayregular.otf
          weight: 400
    - family: Zain
      fonts:
        - asset: assets/fonts/zain-bold.ttf
          weight: 700
        - asset: assets/fonts/zain-regular.ttf
          weight: 400

    # ── New Brand: Special Cards (بطاقاتي الخاصة) ──

    # Arabic primary — ManchetteFine (9 weights; Heavy has no Flutter slot)
    - family: ManchetteFine
      fonts:
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-Thin.ttf"
          weight: 100
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-UltraLight.ttf"
          weight: 200
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-Light.ttf"
          weight: 300
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-Regular.ttf"
          weight: 400
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-Medium.ttf"
          weight: 500
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-SemiBold.ttf"
          weight: 600
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-Bold.ttf"
          weight: 700
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-ExtraBold.ttf"
          weight: 800
        - asset: "assets/fonts/Manchette Fine/Manchette Fine/ManchetteFine-Black.ttf"
          weight: 900

    # Latin display / headings — Thmanyah Serif Display
    - family: ThmanyahSerifDisplay
      fonts:
        - asset: "assets/fonts/thmanyah typeface/thmanyahserifdisplay/thmanyahserifdisplay-Light.otf"
          weight: 300
        - asset: "assets/fonts/thmanyah typeface/thmanyahserifdisplay/thmanyahserifdisplay-Regular.otf"
          weight: 400
        - asset: "assets/fonts/thmanyah typeface/thmanyahserifdisplay/thmanyahserifdisplay-Medium.otf"
          weight: 500
        - asset: "assets/fonts/thmanyah typeface/thmanyahserifdisplay/thmanyahserifdisplay-Bold.otf"
          weight: 700
        - asset: "assets/fonts/thmanyah typeface/thmanyahserifdisplay/thmanyahserifdisplay-Black.otf"
          weight: 900

    # Latin body / long-form text — Thmanyah Serif Text
    - family: ThmanyahSerifText
      fonts:
        - asset: "assets/fonts/thmanyah typeface/thmanyahseriftext/thmanyahseriftext-Light.otf"
          weight: 300
        - asset: "assets/fonts/thmanyah typeface/thmanyahseriftext/thmanyahseriftext-Regular.otf"
          weight: 400
        - asset: "assets/fonts/thmanyah typeface/thmanyahseriftext/thmanyahseriftext-Medium.otf"
          weight: 500
        - asset: "assets/fonts/thmanyah typeface/thmanyahseriftext/thmanyahseriftext-Bold.otf"
          weight: 700
        - asset: "assets/fonts/thmanyah typeface/thmanyahseriftext/thmanyahseriftext-Black.otf"
          weight: 900

    # Numbers, UI labels, stats — Thmanyah Sans
    - family: ThmanyahSans
      fonts:
        - asset: "assets/fonts/thmanyah typeface/thmanyahsans/thmanyahsans-Light.otf"
          weight: 300
        - asset: "assets/fonts/thmanyah typeface/thmanyahsans/thmanyahsans-Regular.otf"
          weight: 400
        - asset: "assets/fonts/thmanyah typeface/thmanyahsans/thmanyahsans-Medium.otf"
          weight: 500
        - asset: "assets/fonts/thmanyah typeface/thmanyahsans/thmanyahsans-Bold.otf"
          weight: 700
        - asset: "assets/fonts/thmanyah typeface/thmanyahsans/thmanyahsans-Black.otf"
          weight: 900

